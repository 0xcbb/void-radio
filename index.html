<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f5f2" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23f6d8d6'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23de3531'/%3E%3C/svg%3E" />
    <title>Void Radio Listen</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #de3531;
        --paper: #f6f6f2;
        --ink: #202322;
        --muted: #777b78;
        --panel: #16191b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 50% 8%, rgba(222, 53, 49, 0.09), transparent 32rem),
          linear-gradient(180deg, #fbfbf8 0%, var(--paper) 48%, #e8e9e5 100%);
        color: var(--ink);
      }

      main {
        width: min(100%, 460px);
        min-height: 100vh;
        margin: 0 auto;
        padding: max(22px, env(safe-area-inset-top)) 22px
          max(24px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .lamp {
        width: 31px;
        height: 31px;
        border-radius: 50%;
        background: rgba(222, 53, 49, 0.12);
        border: 1px solid rgba(222, 53, 49, 0.22);
        position: relative;
      }

      .lamp::after {
        content: "";
        position: absolute;
        inset: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(222, 53, 49, 0.54);
      }

      .mode {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .card {
        border-radius: 34px;
        padding: 22px;
        min-height: 420px;
        background:
          radial-gradient(circle at 50% 38%, rgba(222, 53, 49, 0.35), transparent 9rem),
          linear-gradient(135deg, #42464a 0%, #262a2d 48%, #151719 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 34px 72px rgba(31, 35, 35, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -24px 44px rgba(0, 0, 0, 0.3);
        color: white;
        overflow: hidden;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 50px -24px auto;
        height: 130px;
        opacity: 0.32;
        background: repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.88) 0 3px,
          transparent 3px 14px
        );
        mask-image: linear-gradient(90deg, transparent, #000 16%, #000 84%, transparent);
      }

      .frequency {
        position: relative;
        margin-top: 74px;
        text-align: center;
        font-size: clamp(58px, 18vw, 96px);
        line-height: 0.92;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
      }

      .station {
        position: relative;
        margin-top: 18px;
        text-align: center;
        font-size: 23px;
        line-height: 1.12;
        font-weight: 850;
      }

      .place {
        position: relative;
        margin-top: 9px;
        text-align: center;
        color: rgba(255, 255, 255, 0.64);
        font-size: 13px;
        line-height: 1.35;
        font-weight: 750;
      }

      .now {
        position: relative;
        margin: 26px auto 18px;
        width: fit-content;
        max-width: 100%;
        border-radius: 999px;
        padding: 8px 12px;
        color: rgba(255, 255, 255, 0.74);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px;
        font-weight: 760;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .listen-actions {
        position: relative;
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .listen-button {
        appearance: none;
        border: 0;
        width: 100%;
        min-height: 54px;
        border-radius: 999px;
        color: white;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 48%),
          var(--accent);
        box-shadow:
          0 18px 36px rgba(222, 53, 49, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        font: inherit;
        font-size: 15px;
        font-weight: 850;
        cursor: pointer;
      }

      .listen-button:disabled {
        cursor: wait;
        opacity: 0.74;
      }

      .status {
        min-height: 18px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 12px;
        line-height: 1.5;
        font-weight: 720;
        text-align: center;
      }

      audio {
        position: relative;
        width: 100%;
        margin-top: 12px;
        accent-color: var(--accent);
      }

      .fallback {
        position: relative;
        display: none;
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.6;
        font-weight: 700;
      }

      .fallback a {
        color: white;
        text-underline-offset: 3px;
      }

      .story {
        padding: 0 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
        font-weight: 680;
        text-align: center;
      }

      .coords {
        margin-top: 2px;
        color: #999d9a;
        font-size: 12px;
        line-height: 1.5;
        font-weight: 760;
        text-align: center;
      }

      .app-link {
        display: none;
        width: fit-content;
        margin: 14px auto 0;
        border-radius: 999px;
        padding: 10px 15px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(32, 35, 34, 0.08);
        box-shadow: 0 16px 32px rgba(31, 35, 35, 0.1);
        font-size: 13px;
        font-weight: 820;
        text-decoration: none;
      }

      .footer {
        display: flex;
        justify-content: center;
        color: #8a8d88;
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand">
        <div class="brand-mark">
          <span class="lamp" aria-hidden="true"></span>
          <span>Void Radio</span>
        </div>
        <div class="mode" id="mode">LIVE</div>
      </header>

      <section class="card" aria-label="Void Radio player">
        <div class="frequency" id="frequency">NET</div>
        <div class="station" id="station">网络电台</div>
        <div class="place" id="place">正在读取声音明信片</div>
        <div class="now" id="now">Live stream</div>
        <div class="listen-actions">
          <button class="listen-button" id="playButton" type="button">
            立即收听
          </button>
          <div class="status" id="playStatus">点击后在浏览器中播放直播流</div>
        </div>
        <audio id="audio" controls preload="none"></audio>
        <div class="fallback" id="fallback">
          如果播放器没有声音，可以打开
          <a id="streamLink" href="#" rel="noreferrer">原始直播流</a>。
        </div>
      </section>

      <section>
        <div class="story" id="story">
          一张从 Void Radio 分享出来的声音明信片。
        </div>
        <div class="coords" id="coords"></div>
        <a class="app-link" id="appLink" href="#" rel="noreferrer">在 Void Radio 打开</a>
      </section>

      <footer class="footer">
        <span>Zero backend sound postcard</span>
        <span aria-hidden="true">&nbsp;/&nbsp;</span>
        <a href="privacy.html">隐私</a>
        <span aria-hidden="true">&nbsp;/&nbsp;</span>
        <a href="support.html">支持</a>
        <span aria-hidden="true">&nbsp;/&nbsp;</span>
        <a href="legal.html">来源</a>
      </footer>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const text = (key, fallback) => {
        const value = params.get(key);
        return value && value.trim() ? value.trim() : fallback;
      };

      const station = text("station", "网络电台");
      const place = text("place", "Internet Radio");
      const frequency = text("freq", "NET");
      const now = text("now", "Live stream");
      const mode = text("mode", "live").toUpperCase();
      const story = text("story", "我在 Void Radio 发现了一个可以直接收听的网络电台。");
      const stream = text("stream", "");
      const fallback = text("fallback", "");
      const incomingApp = text("app", "");
      const lat = text("lat", "");
      const lng = text("lng", "");
      const streams = [stream, ...fallback.split("|")]
        .map((value) => value.trim())
        .filter((value, index, array) => value && array.indexOf(value) === index);
      const appParams = new URLSearchParams();
      ["station", "place", "freq", "stream", "fallback", "now", "mode", "lat", "lng"].forEach((key) => {
        const value = params.get(key);
        if (value && value.trim()) appParams.set(key, value.trim());
      });
      const app = incomingApp || (stream ? `voidradio://listen?${appParams.toString()}` : "");

      document.title = `${station} · Void Radio`;
      document.getElementById("station").textContent = station;
      document.getElementById("place").textContent = place;
      document.getElementById("frequency").textContent = frequency;
      document.getElementById("now").textContent = now;
      document.getElementById("mode").textContent = mode === "ANTIPODE" ? "ANTIPODE" : "LIVE";
      document.getElementById("story").textContent = story;

      if (lat && lng) {
        document.getElementById("coords").textContent = `${lat}, ${lng}`;
      }

      const audio = document.getElementById("audio");
      const link = document.getElementById("streamLink");
      const playButton = document.getElementById("playButton");
      const playStatus = document.getElementById("playStatus");
      let streamIndex = 0;
      let userStarted = false;
      let switching = false;
      let fallbackTimer = null;

      const setStatus = (value) => {
        playStatus.textContent = value;
      };

      const clearFallbackTimer = () => {
        if (fallbackTimer !== null) {
          window.clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
      };

      const armFallbackTimer = () => {
        clearFallbackTimer();
        fallbackTimer = window.setTimeout(() => {
          if (!userStarted || audio.readyState >= HTMLMediaElement.HAVE_FUTURE_DATA) {
            return;
          }
          switching = false;
          void tryNextStream();
        }, 8000);
      };

      const useStream = (index) => {
        clearFallbackTimer();
        streamIndex = index;
        audio.src = streams[streamIndex];
        link.href = streams[streamIndex];
      };

      const tryPlay = async () => {
        if (!streams.length) {
          setStatus("这张声音明信片没有携带可播放直播流。");
          return;
        }
        userStarted = true;
        playButton.disabled = true;
        setStatus(streamIndex === 0 ? "正在接入直播流..." : `正在尝试备用流 ${streamIndex + 1}/${streams.length}...`);
        if (!audio.src) {
          useStream(0);
        }
        armFallbackTimer();
        try {
          await audio.play();
          clearFallbackTimer();
          playButton.textContent = "正在播放";
        } catch (error) {
          clearFallbackTimer();
          await tryNextStream();
        } finally {
          playButton.disabled = false;
        }
      };

      const tryNextStream = async () => {
        if (switching) return;
        if (streamIndex + 1 >= streams.length) {
          clearFallbackTimer();
          playButton.textContent = "重新收听";
          setStatus("当前直播流暂时不可用，可打开原始直播流再试。");
          return;
        }
        switching = true;
        useStream(streamIndex + 1);
        setStatus(`主源不可用，正在尝试备用流 ${streamIndex + 1}/${streams.length}...`);
        armFallbackTimer();
        try {
          await audio.play();
          clearFallbackTimer();
          playButton.textContent = "正在播放";
        } catch (error) {
          clearFallbackTimer();
          switching = false;
          await tryNextStream();
          return;
        }
        switching = false;
      };

      if (streams.length) {
        useStream(0);
        document.getElementById("fallback").style.display = "block";
      } else {
        playButton.disabled = true;
        setStatus("缺少直播流链接。");
      }

      playButton.addEventListener("click", tryPlay);
      audio.addEventListener("playing", () => {
        clearFallbackTimer();
        playButton.textContent = "正在播放";
        setStatus("直播流已接入");
      });
      audio.addEventListener("pause", () => {
        if (userStarted && !audio.ended) {
          playButton.textContent = "继续收听";
          setStatus("已暂停");
        }
      });
      audio.addEventListener("waiting", () => {
        if (userStarted) setStatus("缓冲直播流...");
      });
      audio.addEventListener("error", () => {
        if (userStarted) {
          void tryNextStream();
        } else if (streams.length) {
          setStatus("直播流需要点击后播放。");
        }
      });

      if (app) {
        const appLink = document.getElementById("appLink");
        appLink.href = app;
        appLink.style.display = "block";
      }
    </script>
  </body>
</html>
