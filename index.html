<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f5f2" />
    <title>Void Radio Listen</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #de3531;
        --paper: #f6f6f2;
        --ink: #202322;
        --muted: #777b78;
        --panel: #16191b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 50% 8%, rgba(222, 53, 49, 0.09), transparent 32rem),
          linear-gradient(180deg, #fbfbf8 0%, var(--paper) 48%, #e8e9e5 100%);
        color: var(--ink);
      }

      main {
        width: min(100%, 460px);
        min-height: 100vh;
        margin: 0 auto;
        padding: max(22px, env(safe-area-inset-top)) 22px
          max(24px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .lamp {
        width: 31px;
        height: 31px;
        border-radius: 50%;
        background: rgba(222, 53, 49, 0.12);
        border: 1px solid rgba(222, 53, 49, 0.22);
        position: relative;
      }

      .lamp::after {
        content: "";
        position: absolute;
        inset: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(222, 53, 49, 0.54);
      }

      .mode {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .card {
        border-radius: 34px;
        padding: 22px;
        min-height: 420px;
        background:
          radial-gradient(circle at 50% 38%, rgba(222, 53, 49, 0.35), transparent 9rem),
          linear-gradient(135deg, #42464a 0%, #262a2d 48%, #151719 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 34px 72px rgba(31, 35, 35, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -24px 44px rgba(0, 0, 0, 0.3);
        color: white;
        overflow: hidden;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 50px -24px auto;
        height: 130px;
        opacity: 0.32;
        background: repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.88) 0 3px,
          transparent 3px 14px
        );
        mask-image: linear-gradient(90deg, transparent, #000 16%, #000 84%, transparent);
      }

      .frequency {
        position: relative;
        margin-top: 74px;
        text-align: center;
        font-size: clamp(58px, 18vw, 96px);
        line-height: 0.92;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
      }

      .station {
        position: relative;
        margin-top: 18px;
        text-align: center;
        font-size: 23px;
        line-height: 1.12;
        font-weight: 850;
      }

      .place {
        position: relative;
        margin-top: 9px;
        text-align: center;
        color: rgba(255, 255, 255, 0.64);
        font-size: 13px;
        line-height: 1.35;
        font-weight: 750;
      }

      .now {
        position: relative;
        margin: 26px auto 18px;
        width: fit-content;
        max-width: 100%;
        border-radius: 999px;
        padding: 8px 12px;
        color: rgba(255, 255, 255, 0.74);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px;
        font-weight: 760;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      audio {
        position: relative;
        width: 100%;
        margin-top: 12px;
        accent-color: var(--accent);
      }

      .fallback {
        position: relative;
        display: none;
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.6;
        font-weight: 700;
      }

      .fallback a {
        color: white;
        text-underline-offset: 3px;
      }

      .story {
        padding: 0 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
        font-weight: 680;
        text-align: center;
      }

      .coords {
        margin-top: 2px;
        color: #999d9a;
        font-size: 12px;
        line-height: 1.5;
        font-weight: 760;
        text-align: center;
      }

      .footer {
        display: flex;
        justify-content: center;
        color: #8a8d88;
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand">
        <div class="brand-mark">
          <span class="lamp" aria-hidden="true"></span>
          <span>Void Radio</span>
        </div>
        <div class="mode" id="mode">LIVE</div>
      </header>

      <section class="card" aria-label="Void Radio player">
        <div class="frequency" id="frequency">NET</div>
        <div class="station" id="station">网络电台</div>
        <div class="place" id="place">正在读取声音明信片</div>
        <div class="now" id="now">Live stream</div>
        <audio id="audio" controls preload="none"></audio>
        <div class="fallback" id="fallback">
          如果播放器没有声音，可以打开
          <a id="streamLink" href="#" rel="noreferrer">原始直播流</a>。
        </div>
      </section>

      <section>
        <div class="story" id="story">
          一张从 Void Radio 分享出来的声音明信片。
        </div>
        <div class="coords" id="coords"></div>
      </section>

      <footer class="footer">Zero backend sound postcard</footer>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const text = (key, fallback) => {
        const value = params.get(key);
        return value && value.trim() ? value.trim() : fallback;
      };

      const station = text("station", "网络电台");
      const place = text("place", "Internet Radio");
      const frequency = text("freq", "NET");
      const now = text("now", "Live stream");
      const mode = text("mode", "live").toUpperCase();
      const story = text("story", "我在 Void Radio 发现了一个可以直接收听的网络电台。");
      const stream = text("stream", "");
      const lat = text("lat", "");
      const lng = text("lng", "");

      document.title = `${station} · Void Radio`;
      document.getElementById("station").textContent = station;
      document.getElementById("place").textContent = place;
      document.getElementById("frequency").textContent = frequency;
      document.getElementById("now").textContent = now;
      document.getElementById("mode").textContent = mode === "ANTIPODE" ? "ANTIPODE" : "LIVE";
      document.getElementById("story").textContent = story;

      if (lat && lng) {
        document.getElementById("coords").textContent = `${lat}, ${lng}`;
      }

      if (stream) {
        const audio = document.getElementById("audio");
        const link = document.getElementById("streamLink");
        audio.src = stream;
        link.href = stream;
        document.getElementById("fallback").style.display = "block";
      }
    </script>
  </body>
</html>
